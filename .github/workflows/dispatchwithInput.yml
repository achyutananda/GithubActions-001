name: Dispatch with Input
on: 
  workflow_dispatch:
    inputs:
      build_type:
        default: 'uat'
        description: 'Sect build type: uat, prod'
        required: true
      version:
        default: '1.0'
        description: 'Input version'
        required: true
      lint:
        default: true
        type: boolean
        description: 'Enable lint'
        required: false
      test:
        default: true
        type: boolean
        description: 'Enable test'
        required: false
      build:
        default: true
        type: boolean
        description: 'Enable build'
        required: false
      release_notes:
        default: 'Release Notes.'
        required: true
env:
  JAVA_VERSION: '17'
  
jobs:
  lint:
    runs-on: ubuntu-latest
    if: ${{inputs.lint == true}}
    steps:
      - name: check out
        uses: actions/checkout@v4
        with:
          ref: ${{github.ref_name}}
      - name: Java setup
        uses: actions/setup-java@v4
        with:
          java-version: ${{env.JAVA_VERSION}}
          distribution: temurin
          cache: gradle
      - name: Permission execute gradle
        run: chmod +x gradle
      - name: Lint
        run: ./gradlew lintDebug
      - name: Upload Lint Report
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
          retention-days: 7
      - name: Print Lint
        run: |
          echo Branch : ${{github.ref_name}}
          echo Build type : ${{inputs.build_type}}
          echo Version : ${{inputs.version}}
          echo Lint : ${{inputs.lint}}
          echo Release Notes : ${{inputs.release_notes}}
  test:
    runs-on: ubuntu-latest
    if: ${{inputs.test == true}}
    needs: lint
    steps:
      - name: check out
        uses: actions/checkout@v4
      - name: Java setup
        uses: actions/setup-java@v4
        with:
          java-version: ${{env.JAVA_VERSION}}
          distribution: temurin
          cache: gradle
      - name: Permission execute gradle
        run: chmod +x gradle
      - name: Test
        run: ./gradlew testDebugUnitTest
      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 7
  build-debug:
    runs-on: ubuntu-latest
    if: ${{inputs.build == true && inputs.build_type == 'uat'}}
    needs: [test]
    steps:
      - name: Checkoutout
        uses: actions/checkout@v4
      - name: Java Setup
        uses: actions/setup-java@v4
        with:
          java-version: ${{env.JAVA_VERSION}}
          distribution: temurin
          cache: gradle
      - name: Permission gradle
        run: chmod +x gradlew
      - name: Build apk
        run: ./gradlew assembleDebug
      - name: Upload apk
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{inputs.build_type}}-${{inputs.version}}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
  deploy-firebase-app-dist:
    runs-on: ubuntu-latest
    needs: build-debug
    if: ${{inputs.build==true && inputs.build_type=='uat'}}
    steps:
      - name: Printing value from uat env value
        run: |
          echo uat env variable ${{vars.MY_UAT_VARIABLE}}
          echo uat env secrets ${{secrets.MY_UAT_SECRET}}
      - name: Download app
        uses: actions/download-artifact@v4
        with:
          name: app-debug-${{inputs.build_type}}-${{inputs.version}}
          path: apk/
      - name: Print downloaded file name
        run: find ./apk -type f
      - name: Firebase app distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1.7.1
        with:
          appId: ${{secrets.ACTIONS_001_FIREBASE_APP_ID}}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIAL_FILE_CONTENT }}
          file: apk/app-debug.apk
          releaseNotes: |
            Debug build -- qa internal only
            Version: ${{inputs.version}}
            Build: ${{github.run_number}}
            Branch: ${{github.ref_name}}
            Commit: ${{github.sha}}
            
          
  build-prod:
    runs-on: ubuntu-latest
    if: ${{ inputs.build==true && inputs.build_type=='prod' }}
    needs: [lint,test]
    environment: prod
    steps:
      - name: Check env variable
        run: |
          echo prod env variable ${{vars.MY_PROD_VARIABLE}}
          echo prod env secrets ${{secrets.MY_PROD_SECRET}}
      - name: Following step to deploy to prod
        run: |
          echo 'checkout code -> set up java -> gradle permission -> decode upload key from base 64 and store in app/release.keystore with below command: 
          -> run: | 
              echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
          -> run: |
              ./gradlew assembleRelease
              -Pandroid.injected.signing.store.file = $GITHUB_WORKSPACE/app/release.keystore \
              -Pandroid.injected.signing.store.password = $STORE_PASSWORD \
              -Pandroid.injected.signing.key.alias = $KEY_ALIAS \
              -Pandroid.injected.signing.key.password = $KEY_PASSWORD \
              -- stacktrace'
      - name: Upload to production
        run: echo upload to prod 
  
  
