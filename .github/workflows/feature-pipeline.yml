name: Feature Debug Build
on: 
  push:
    branches:
      - feature/*
  workflow_dispatch:
env:
  JAVA_VERSION: 17
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: gradle
      - name: Gradle Permission
        run: chmod +x gradlew
      - name: Run Lint
        run: ./gradlew lintDebug
